<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checksum Altercator</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    max-width: 640px;
    margin: 40px auto;
    padding: 0 20px;
    line-height: 1.5;
  }
  h1 { margin-bottom: 4px; }
  p.subtitle { color: #888; margin-top: 0; }
  .drop {
    border: 2px dashed #aaa;
    border-radius: 10px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .drop.hover { border-color: #4a9eff; background: rgba(74,158,255,0.08); }
  .drop input { display: none; }
  button {
    font-size: 16px;
    padding: 10px 18px;
    border: none;
    border-radius: 6px;
    background: #4a9eff;
    color: white;
    cursor: pointer;
    margin-top: 16px;
  }
  button:disabled { background: #888; cursor: not-allowed; }
  label.count {
    display: block;
    margin-top: 16px;
    font-size: 14px;
  }
  input[type=number] {
    width: 80px;
    padding: 4px 8px;
    font-size: 14px;
  }
  .result {
    margin-top: 24px;
    padding: 16px;
    border-radius: 8px;
    background: rgba(128,128,128,0.1);
    font-size: 13px;
    word-break: break-all;
  }
  .result .row { margin: 6px 0; }
  .result .label { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
  .result code { font-family: "SF Mono", Menlo, Consolas, monospace; }
  .err { color: #d33; margin-top: 12px; }
</style>
</head>
<body>
<h1>Checksum Altercator</h1>
<p class="subtitle">Append random bytes so file content differs but stays readable. PDF / JPG / PNG.</p>

<label class="drop" id="drop">
  <input type="file" id="file">
  <div id="dropText">Click or drop file here</div>
</label>

<label class="count">
  Random bytes to append:
  <input type="number" id="byteCount" value="16" min="1" max="1024">
</label>

<button id="go" disabled>Alter &amp; Download</button>

<div id="err" class="err"></div>
<div id="result" class="result" style="display:none"></div>

<script>
const drop = document.getElementById('drop');
const fileInput = document.getElementById('file');
const dropText = document.getElementById('dropText');
const goBtn = document.getElementById('go');
const result = document.getElementById('result');
const errEl = document.getElementById('err');
const byteCountInput = document.getElementById('byteCount');

let selectedFile = null;

function setFile(f) {
  selectedFile = f;
  dropText.textContent = f ? `${f.name} (${f.size.toLocaleString()} bytes)` : 'Click or drop file here';
  goBtn.disabled = !f;
  errEl.textContent = '';
}

fileInput.addEventListener('change', e => setFile(e.target.files[0] || null));

['dragenter','dragover'].forEach(ev => drop.addEventListener(ev, e => {
  e.preventDefault(); drop.classList.add('hover');
}));
['dragleave','drop'].forEach(ev => drop.addEventListener(ev, e => {
  e.preventDefault(); drop.classList.remove('hover');
}));
drop.addEventListener('drop', e => {
  const f = e.dataTransfer.files[0];
  if (f) setFile(f);
});

async function sha256(buf) {
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash))
    .map(b => b.toString(16).padStart(2,'0')).join('');
}

function download(bytes, name) {
  const blob = new Blob([bytes], { type: 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function alteredName(orig) {
  const dot = orig.lastIndexOf('.');
  if (dot <= 0) return orig + '-altered';
  return orig.slice(0, dot) + '-altered' + orig.slice(dot);
}

goBtn.addEventListener('click', async () => {
  if (!selectedFile) return;
  errEl.textContent = '';
  goBtn.disabled = true;
  goBtn.textContent = 'Working...';

  try {
    const n = Math.max(1, Math.min(1024, parseInt(byteCountInput.value, 10) || 16));
    const origBuf = await selectedFile.arrayBuffer();
    const origHash = await sha256(origBuf);

    const rand = new Uint8Array(n);
    crypto.getRandomValues(rand);

    const out = new Uint8Array(origBuf.byteLength + n);
    out.set(new Uint8Array(origBuf), 0);
    out.set(rand, origBuf.byteLength);

    const newHash = await sha256(out.buffer);
    const newName = alteredName(selectedFile.name);

    download(out, newName);

    result.style.display = 'block';
    result.innerHTML = `
      <div class="row"><div class="label">Original SHA-256</div><code>${origHash}</code></div>
      <div class="row"><div class="label">New SHA-256</div><code>${newHash}</code></div>
      <div class="row"><div class="label">Appended</div>${n} random bytes &rarr; saved as <code>${newName}</code></div>
    `;
  } catch (e) {
    errEl.textContent = 'Error: ' + e.message;
  } finally {
    goBtn.disabled = false;
    goBtn.textContent = 'Alter & Download';
  }
});
</script>
</body>
</html>
